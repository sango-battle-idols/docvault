<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>珊瑚 | SANGŌ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Narrow:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #130810;
      --border:  #2a1e22;
      --border2: #253028;
      --subtle:  #7a6060;
      --body:    #c4b4b0;
      --bright:  #f0e8e0;
      --gold:    #c49a3c;
      --font:    "PT Sans Narrow", sans-serif;
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--body);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s ease;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(180,100,40,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 60% 60% at 80% 100%, rgba(30,80,70,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    header {
      display: block;
      width: 100%;
      height: 110px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: url("https://64.media.tumblr.com/cb97bd3071502c4697a8536061d578c2/a426dc8d6857108e-27/s2048x3072/bc840abc466569ab61d2444bcbfefb7b50438ee2.pnj") center center / cover no-repeat;
      z-index: 10;
    }
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 28px 80px;
      position: relative;
      z-index: 1;
    }
    .state { text-align: center; padding: 80px 0; }
    .state-icon {
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .state-title {
      font-family: var(--font);
      font-size: 32px;
      font-weight: 700;
      color: var(--bright);
      margin-bottom: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .state-desc {
      color: var(--subtle);
      font-family: var(--font);
      font-size: 20px;
      max-width: 340px;
      margin: 0 auto;
      line-height: 2;
      white-space: pre-line;
    }
    .state-desc em {
      display: block;
      margin-top: 12px;
      font-style: normal;
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 0.06em;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 1.5px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sango-emblem {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 0 16px rgba(196,154,60,0.25));
      object-fit: contain;
    }
    #doc-container { display: none; }
    .doc-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border2);
    }
    .doc-meta-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    .doc-meta-label {
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtle);
    }
    #doc-content { text-align: center; }
    #doc-content * { font-family: var(--font) !important; max-width: 100%; }
    #doc-content p { margin-bottom: 1em; }
    #doc-content a { text-decoration: underline; }
    #doc-content table { border-collapse: collapse; width: 100%; margin: 1.5em auto; }
    #doc-content td, #doc-content th { padding: 8px 12px; text-align: left; }
    #doc-content ul, #doc-content ol { padding-left: 1.5em; margin-bottom: 1em; display: inline-block; text-align: left; }
    #doc-content li { margin-bottom: 0.3em; }
    #doc-content hr { border: none; border-top: 1px solid var(--border2); margin: 2em 0; }
    #doc-content img { max-width: 100%; height: auto; }
    .divider-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 16px auto;
      opacity: 0.5;
    }
  </style>
  <style id="doc-style-inject"></style>
</head>
<body>

<header></header>

<main>

  <div id="state-loading" class="state">
    <div class="spinner"></div>
    <div class="state-title">Loading…</div>
    <p class="state-desc">Retrieving document.</p>
  </div>

  <div id="state-landing" class="state" style="display:none">
    <div class="state-icon">
      <img class="sango-emblem" src="https://64.media.tumblr.com/0304300b89525be61d2e05e78b81ddf8/10464a0a1d1c18c3-c5/s1280x1920/6e8a6d6a32053b16a74df0f34340dea5025558e1.pnj" alt="Sangō Idol-Defense Force emblem" />
    </div>
    <div class="divider-line"></div>
    <div class="state-title">Missing Document</div>
    <p class="state-desc">Are you looking for something here?
I don't think you'll find it.<em>— Kamikawa Hiromi</em></p>
  </div>

  <div id="state-expired" class="state" style="display:none">
    <div class="state-icon">
      <img class="sango-emblem" src="https://64.media.tumblr.com/0304300b89525be61d2e05e78b81ddf8/10464a0a1d1c18c3-c5/s1280x1920/6e8a6d6a32053b16a74df0f34340dea5025558e1.pnj" alt="Sangō Idol-Defense Force emblem" />
    </div>
    <div class="divider-line"></div>
    <div class="state-title">Missing Document</div>
    <p class="state-desc">Are you looking for something here?
I don't think you'll find it.<em>— Kamikawa Hiromi</em></p>
  </div>

  <div id="state-error" class="state" style="display:none">
    <div class="state-icon">
      <img class="sango-emblem" src="https://64.media.tumblr.com/0304300b89525be61d2e05e78b81ddf8/10464a0a1d1c18c3-c5/s1280x1920/6e8a6d6a32053b16a74df0f34340dea5025558e1.pnj" alt="Sangō Idol-Defense Force emblem" />
    </div>
    <div class="state-title">Something Went Wrong</div>
    <p class="state-desc" id="error-msg">Could not load this document.</p>
  </div>

  <div id="doc-container">
    <div class="doc-meta">
      <div class="doc-meta-dot"></div>
      <span class="doc-meta-label">Read Only</span>
    </div>
    <div id="doc-content"></div>
  </div>

</main>

<script>
  const allStates = ["loading", "landing", "expired", "error"];

  function showState(name) {
    allStates.forEach(s => {
      document.getElementById("state-" + s).style.display = s === name ? "" : "none";
    });
    document.getElementById("doc-container").style.display = "none";
  }

  function showDoc() {
    allStates.forEach(s => {
      document.getElementById("state-" + s).style.display = "none";
    });
    document.getElementById("doc-container").style.display = "block";
  }

  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && ["s", "a"].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });

  const path = window.location.pathname.replace(/^\//, "").trim();
  const params = new URLSearchParams(window.location.search);
  const tokenInUrl = params.get("sn");

  if (!path) {
    showState("landing");
  } else if (tokenInUrl) {
    loadDoc(tokenInUrl);
  } else {
    showState("loading");
    fetch("/api/redirect?slug=" + encodeURIComponent(path))
      .then(async res => {
        const data = await res.json();
        if (res.status === 404) { showState("expired"); return; }
        if (!res.ok) { showState("error"); return; }
        window.location.replace("/" + path + "?sn=" + encodeURIComponent(data.token));
      })
      .catch(() => showState("error"));
  }

  function loadDoc(token) {
    showState("loading");
    fetch("/api/doc?sn=" + encodeURIComponent(token))
      .then(async res => {
        const data = await res.json();
        if (res.status === 410 || data.error === "expired") { showState("expired"); return; }
        if (!res.ok) {
          document.getElementById("error-msg").textContent = data.message || data.error || "Unknown error.";
          showState("error");
          return;
        }
        if (data.bgColor) {
          document.body.style.background = data.bgColor;
        }
        if (data.docStyles) {
          document.getElementById("doc-style-inject").textContent = data.docStyles;
        }
        document.getElementById("doc-content").innerHTML = data.content;
        showDoc();
      })
      .catch(() => {
        document.getElementById("error-msg").textContent = "Network error. Please try again.";
        showState("error");
      });
  }
</script>
</body>
</html>
